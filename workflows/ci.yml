name: CI – BIP Fullstack

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 – Backend Spring Boot: build + testes unitários + integração
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes
        run: mvn -B -f backend-module/pom.xml clean verify

      - name: Upload relatório Surefire
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend-module/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 2 – EJB Module: compilação
  # ─────────────────────────────────────────────────────────────
  ejb:
    name: EJB Module – Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar módulo EJB
        run: mvn -B -f ejb-module/pom.xml clean compile

  # ─────────────────────────────────────────────────────────────
  # JOB 3 – Frontend Angular: testes unitários + build produção
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend – Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Executar testes unitários
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build de produção
        working-directory: frontend
        run: npm run build -- --configuration=production
